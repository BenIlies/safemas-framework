# SafeMAS template (generated from frontend/src/lib/templates.js).
# Clean — no malicious elements. Entrance/exit are structural nodes wired
# to an agent via an "io" edge.
name: rag-pipeline
version: 1
task: Answer a question using the knowledge base.
nodes:
  - id: in-1
    type: entrance
    label: Entrance
    position:
      x: -120
      'y': 160
  - id: agent-1
    type: agent
    label: Retriever
    role: retriever
    position:
      x: 100
      'y': 150
  - id: agent-2
    type: agent
    label: Answerer
    role: finaliser
    position:
      x: 360
      'y': 150
  - id: mem-1
    type: memory
    label: Knowledge Base
    backend: vector
    position:
      x: 100
      'y': 330
  - id: out-1
    type: exit
    label: Exit
    position:
      x: 600
      'y': 160
edges:
  - id: io-in
    source: in-1
    target: agent-1
    kind: io
  - id: edge-1
    source: agent-1
    target: agent-2
    kind: channel
  - id: edge-2
    source: mem-1
    target: agent-1
    kind: attach
  - id: io-out
    source: agent-2
    target: out-1
    kind: io
