# SafeMAS template — a router dispatches to specialists; a collector merges them.
name: router-specialists
version: 1
task: Handle a mixed request that may need code or math.

nodes:
  - id: agent-1
    type: agent
    label: Router
    role: router
    entry: true
    position: {x: 80, y: 200}

  - id: agent-2
    type: agent
    label: Code Specialist
    role: coder
    position: {x: 360, y: 80}

  - id: agent-3
    type: agent
    label: Math Specialist
    role: mathematician
    position: {x: 360, y: 320}

  - id: agent-4
    type: agent
    label: Collector
    role: finaliser
    exit: true
    position: {x: 660, y: 200}

  - id: tool-1
    type: tool
    label: Python REPL
    spec: 'def run(code: str) -> str'
    position: {x: 360, y: -60}

  - id: tool-2
    type: tool
    label: Calculator
    spec: 'def calc(expr: str) -> str'
    position: {x: 360, y: 480}

edges:
  - id: edge-1
    source: agent-1
    target: agent-2
    kind: channel
  - id: edge-2
    source: agent-1
    target: agent-3
    kind: channel
  - id: edge-3
    source: agent-2
    target: agent-4
    kind: channel
  - id: edge-4
    source: agent-3
    target: agent-4
    kind: channel
  - id: edge-5
    source: tool-1
    target: agent-2
    kind: attach
  - id: edge-6
    source: tool-2
    target: agent-3
    kind: attach
