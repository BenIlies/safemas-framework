# SafeMAS template (generated from frontend/src/lib/templates.js).
# Clean — no malicious elements. Entrance/exit are structural nodes wired
# to an agent via an "io" edge.
name: single-agent
version: 1
task: Answer the user’s question.
nodes:
  - id: in-1
    type: entrance
    label: Entrance
    position:
      x: 60
      'y': 160
  - id: agent-1
    type: agent
    label: Assistant
    role: assistant
    position:
      x: 330
      'y': 150
  - id: tool-1
    type: tool
    label: Calculator
    spec: 'def calc(expr: str) -> str'
    position:
      x: 330
      'y': 330
  - id: out-1
    type: exit
    label: Exit
    position:
      x: 600
      'y': 160
edges:
  - id: io-in
    source: in-1
    target: agent-1
    kind: io
  - id: edge-1
    source: tool-1
    target: agent-1
    kind: attach
  - id: io-out
    source: agent-1
    target: out-1
    kind: io
