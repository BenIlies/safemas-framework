# SafeMAS template — a single agent that is both the entrance and the exit.
name: single-agent
version: 1
task: Answer the user’s question.

nodes:
  - id: agent-1
    type: agent
    label: Assistant
    role: assistant
    entry: true
    exit: true
    position: {x: 280, y: 160}

  - id: tool-1
    type: tool
    label: Calculator
    spec: 'def calc(expr: str) -> str'
    position: {x: 280, y: 340}

edges:
  - id: edge-1
    source: tool-1
    target: agent-1
    kind: attach
