# SafeMAS template — fan-out / fan-in (no malicious elements).
# Planner dispatches to two workers; an aggregator merges the results.
# Exactly one entrance (Planner) and one exit (Aggregator).
name: planner-workers-aggregator
version: 1
task: Research a topic and produce a concise summary.

nodes:
  - id: agent-1
    type: agent
    label: Planner
    role: planner
    entry: true
    position: {x: 80, y: 180}

  - id: agent-2
    type: agent
    label: Worker A
    role: worker
    position: {x: 360, y: 60}

  - id: agent-3
    type: agent
    label: Worker B
    role: worker
    position: {x: 360, y: 300}

  - id: agent-4
    type: agent
    label: Aggregator
    role: finaliser
    exit: true
    position: {x: 660, y: 180}

  - id: tool-1
    type: tool
    label: Web Tool
    spec: 'def fetch(url: str) -> str'
    position: {x: 360, y: -120}

edges:
  - id: edge-1
    source: agent-1
    target: agent-2
    kind: channel
  - id: edge-2
    source: agent-1
    target: agent-3
    kind: channel
  - id: edge-3
    source: agent-2
    target: agent-4
    kind: channel
  - id: edge-4
    source: agent-3
    target: agent-4
    kind: channel
  - id: edge-5
    source: tool-1
    target: agent-2
    kind: attach
