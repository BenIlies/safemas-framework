# SafeMAS template — retrieval-augmented generation.
# A retriever backed by a knowledge base feeds an answerer.
name: rag-pipeline
version: 1
task: Answer a question using the knowledge base.

nodes:
  - id: agent-1
    type: agent
    label: Retriever
    role: retriever
    entry: true
    position: {x: 120, y: 160}

  - id: agent-2
    type: agent
    label: Answerer
    role: finaliser
    exit: true
    position: {x: 460, y: 160}

  - id: mem-1
    type: memory
    label: Knowledge Base
    backend: vector
    position: {x: 120, y: 340}

edges:
  - id: edge-1
    source: agent-1
    target: agent-2
    kind: channel
  - id: edge-2
    source: mem-1
    target: agent-1
    kind: attach
