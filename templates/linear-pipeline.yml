# SafeMAS template (generated from frontend/src/lib/templates.js).
# Clean — no malicious elements. Entrance/exit are structural nodes wired
# to an agent via an "io" edge.
name: linear-pipeline
version: 1
task: Write a function that reads a config file and returns its contents.
nodes:
  - id: in-1
    type: entrance
    label: Entrance
    position:
      x: -120
      'y': 160
  - id: agent-1
    type: agent
    label: Planner
    role: planner
    position:
      x: 100
      'y': 150
  - id: agent-2
    type: agent
    label: Coder
    role: worker
    position:
      x: 360
      'y': 150
  - id: agent-3
    type: agent
    label: Reviewer
    role: finaliser
    position:
      x: 620
      'y': 150
  - id: mem-1
    type: memory
    label: Shared Memory
    backend: vector
    position:
      x: 360
      'y': 330
  - id: tool-1
    type: tool
    label: Search Tool
    spec: 'def search(q: str) -> str'
    position:
      x: 360
      'y': -30
  - id: out-1
    type: exit
    label: Exit
    position:
      x: 860
      'y': 160
edges:
  - id: io-in
    source: in-1
    target: agent-1
    kind: io
  - id: edge-1
    source: agent-1
    target: agent-2
    kind: channel
  - id: edge-2
    source: agent-2
    target: agent-3
    kind: channel
  - id: edge-3
    source: mem-1
    target: agent-2
    kind: attach
  - id: edge-4
    source: tool-1
    target: agent-2
    kind: attach
  - id: io-out
    source: agent-3
    target: out-1
    kind: io
