# SafeMAS template — a clean linear pipeline (no malicious elements).
# Mark any element malicious in the editor to probe the design's safety.
# Exactly one entrance (receives the task) and one exit (final answer).
name: linear-pipeline
version: 1
task: Write a function that reads a config file and returns its contents.

nodes:
  - id: agent-1
    type: agent
    label: Planner
    role: planner
    entry: true
    position: {x: 80, y: 160}

  - id: agent-2
    type: agent
    label: Coder
    role: worker
    position: {x: 360, y: 160}

  - id: agent-3
    type: agent
    label: Reviewer
    role: finaliser
    exit: true
    position: {x: 640, y: 160}

  - id: mem-1
    type: memory
    label: Shared Memory
    backend: vector
    position: {x: 360, y: 340}

  - id: tool-1
    type: tool
    label: Search Tool
    spec: 'def search(q: str) -> str'
    position: {x: 360, y: -20}

edges:
  - id: edge-1
    source: agent-1
    target: agent-2
    kind: channel
  - id: edge-2
    source: agent-2
    target: agent-3
    kind: channel
  - id: edge-3
    source: mem-1
    target: agent-2
    kind: attach
  - id: edge-4
    source: tool-1
    target: agent-2
    kind: attach
