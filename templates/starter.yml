# SafeMAS template — the minimal MAS: one entrance wired to one exit.
# This is also what "New" generates in the editor.
name: new-mas
version: 1
task: Solve the assigned task.

nodes:
  - id: agent-1
    type: agent
    label: Entrance
    role: entry
    entry: true
    position: {x: 120, y: 160}

  - id: agent-2
    type: agent
    label: Exit
    role: output
    exit: true
    position: {x: 460, y: 160}

edges:
  - id: edge-1
    source: agent-1
    target: agent-2
    kind: channel
